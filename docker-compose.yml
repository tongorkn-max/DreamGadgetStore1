services:
  web:
    build: .
    container_name: dream_gadget_store

    environment:
      DOCKER_ENV: "true"

    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: dream_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dream_gadget_store1
      MYSQL_USER: dreamuser
      MYSQL_PASSWORD: dreampass

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  mysql_data: