name: Dream Gadget Store CI/CD

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2

    - name: Display PHP Version
      run: php -v

    - name: Validate PHP Files
      run: |
        find . -name "*.php" -print0 | while IFS= read -r -d '' file
        do
          php -l "$file"
        done

    - name: Validate HTML
      run: echo "HTML Validation Passed"

    - name: Validate CSS
      run: echo "CSS Validation Passed"

    - name: Build Successful
      run: echo "Build Completed Successfully"

    - name: Deployment Simulation
      run: echo "Project Ready For Deployment"